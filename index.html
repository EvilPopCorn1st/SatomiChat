<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Chat Overlay 1920x1080</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:1920px;
    height:1080px;
    overflow:hidden;
    background:transparent;
}

#container{
    position:relative;
    width:1920px;
    height:1080px;
}

/* Правая колонка под чат */
#chat{
    position:absolute;
    top:0;
    right:0;

    width:500px;
    height:1080px;

    overflow:hidden;
}

/* Сам виджет чата */
#chat iframe{
    width:100%;
    height:100%;
    border:none;
    background:transparent;
}
</style>
</head>

<body>

<div id="container">

    <div id="chat">
        <iframe
            src="http://127.0.0.1:34116/widget/chat">
        </iframe>
    </div>

</div>

</body>
</html>
