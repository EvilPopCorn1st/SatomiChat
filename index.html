<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<title>TikTok Chat Overlay</title>

<style>
html,
body{
    margin:0;
    padding:0;
    width:1920px;
    height:1080px;
    overflow:hidden;

    background:transparent !important;
}

body{
    position:relative;
}

#chat{
    position:absolute;

    right:20px;
    bottom:20px;

    width:500px;
    height:900px;

    background:transparent !important;
}

iframe{
    width:100%;
    height:100%;

    border:none;

    background:transparent !important;
}
</style>

</head>

<body>

<div id="chat">
    <iframe src="http://127.0.0.1:34116/widget/chat"></iframe>
</div>

</body>
</html>
