<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Chat Overlay</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:1920px;
    height:1080px;
    overflow:hidden;
    background:transparent;
}

#overlay{
    width:1920px;
    height:1080px;
    position:relative;
    background:transparent;
}

#chat{
    position:absolute;

    top:0;
    left:0;

    width:1920px;
    height:250px;

    background:transparent;
}

iframe{
    width:100%;
    height:100%;
    border:none;
    background:transparent;
}
</style>

</head>

<body>

<div id="overlay">
    <div id="chat">
        <iframe src="http://127.0.0.1:34116/widget/chat/inline"></iframe>
    </div>
</div>

</body>
</html>
